    <style>
      /* ── CSS Variables ─────────────────────────────────── */
      :root {
        --c-bg: #0a0a0a;
        --c-surface: #111111;
        --c-gold: #c9a84c;
        --c-gold-lt: #e8c97a;
        --c-gold-dk: #8a6a20;
        --c-white: #f5f0e8;
        --c-muted: #6b6457;
        --c-border: rgba(201, 168, 76, 0.18);

        --r-card: 18px;
        --r-btn: 14px;

        --ff-sans: "DM Sans", sans-serif;

        --shadow-gold: 0 8px 40px rgba(201, 168, 76, 0.12);
        --shadow-card: 0 2px 24px rgba(0, 0, 0, 0.6);

        --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Reset ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }

      body {
        font-family: var(--ff-sans);
        background: var(--c-bg);
        color: var(--c-white);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Google Fonts (DM Sans) ────────────────────────── */
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap");

      /* ── Background texture ────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 70% 50% at 50% -10%,
            rgba(201, 168, 76, 0.08) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 30% at 80% 90%,
            rgba(201, 168, 76, 0.05) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Layout wrapper ────────────────────────────────── */
      .wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        padding: 48px 20px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* ── Logo ──────────────────────────────────────────── */
      .logo-wrap {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: #000;
        border: 1.5px solid var(--c-border);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: var(--shadow-gold);
        animation: fadeDown 0.6s ease both;
      }
      .logo-wrap img {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }

      /* ── Divider line ──────────────────────────────────── */
      .divider {
        width: 1px;
        height: 28px;
        background: linear-gradient(
          to bottom,
          transparent,
          var(--c-gold-dk),
          transparent
        );
        margin: 2px 0;
      }

      /* ── Profile photo ─────────────────────────────────── */
      .avatar-wrap {
        position: relative;
        animation: fadeDown 0.6s 0.1s ease both;
      }
      .avatar-ring {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        padding: 2.5px;
        background: linear-gradient(
          135deg,
          var(--c-gold) 0%,
          var(--c-gold-lt) 50%,
          var(--c-gold-dk) 100%
        );
        box-shadow: var(--shadow-gold);
      }
      .avatar-ring img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        object-position: center top;
        display: block;
        border: 2px solid var(--c-bg);
      }

      /* ── Name & subtitle ───────────────────────────────── */
      .identity {
        text-align: center;
        margin-top: 20px;
        animation: fadeUp 0.6s 0.2s ease both;
      }
      .identity h1 {
        font-size: clamp(1.4rem, 5vw, 1.75rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--c-white);
        line-height: 1.15;
      }
      .identity .subtitle {
        margin-top: 6px;
        font-size: 0.72rem;
        font-weight: 400;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-gold);
        opacity: 0.85;
      }

      /* ── Gold rule ─────────────────────────────────────── */
      .rule {
        width: 48px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--c-gold),
          transparent
        );
        margin: 20px 0 24px;
        animation: fadeUp 0.6s 0.3s ease both;
      }

      /* ── Links ─────────────────────────────────────────── */
      .links {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
        animation: fadeUp 0.6s 0.35s ease both;
      }

      .btn {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 16px 22px;
        border-radius: var(--r-btn);
        text-decoration: none;
        font-family: var(--ff-sans);
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        transition:
          transform var(--transition),
          box-shadow var(--transition),
          background var(--transition);
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity var(--transition);
      }

      .btn:hover {
        transform: translateY(-2px);
      }
      .btn:active {
        transform: translateY(0);
      }

      /* WhatsApp */
      .btn-wa {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        color: var(--c-white);
        box-shadow: var(--shadow-card);
      }
      .btn-wa:hover {
        border-color: rgba(37, 211, 102, 0.35);
        box-shadow: 0 8px 32px rgba(37, 211, 102, 0.1);
      }
      .btn-wa .btn-icon {
        color: #25d366;
      }

      /* Instagram */
      .btn-ig {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        color: var(--c-white);
        box-shadow: var(--shadow-card);
      }
      .btn-ig:hover {
        border-color: rgba(201, 168, 76, 0.4);
        box-shadow: var(--shadow-gold);
      }
      /* Maps */
      .btn-maps {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        color: var(--c-white);
        box-shadow: var(--shadow-card);
      }
      .btn-maps:hover {
        border-color: rgba(66, 133, 244, 0.35);
        box-shadow: 0 8px 32px rgba(66, 133, 244, 0.1);
      }
      .btn-maps .btn-icon {
        color: #ea4335;
      }

      .btn-icon {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
      }
      .btn-icon svg {
        width: 22px;
        height: 22px;
      }

      .btn-text {
        flex: 1;
      }
      .btn-label {
        display: block;
        font-size: 0.82rem;
        font-weight: 300;
        color: var(--c-muted);
        margin-bottom: 1px;
      }
      .btn-value {
        font-weight: 500;
      }

      .btn-arrow {
        color: var(--c-muted);
        opacity: 0.5;
        transition:
          opacity var(--transition),
          transform var(--transition);
      }
      .btn:hover .btn-arrow {
        opacity: 1;
        transform: translateX(2px);
      }

      /* ── Footer ────────────────────────────────────────── */
      .footer {
        margin-top: 44px;
        text-align: center;
        font-size: 0.68rem;
        font-weight: 300;
        color: var(--c-muted);
        letter-spacing: 0.06em;
        line-height: 1.7;
        animation: fadeUp 0.6s 0.5s ease both;
      }
      .footer .addr {
        color: rgba(201, 168, 76, 0.5);
        margin-top: 4px;
        font-size: 0.75rem;
      }
      .hyperpage {
        margin-top: 8px;
        font-size: 0.75rem;
        color: rgba(201, 168, 76, 0.5);
      }
      .hyperpage a {
        color: var(--c-gold);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.75rem;
      }

      /* ── Animations ────────────────────────────────────── */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Responsive tweaks ─────────────────────────────── */
      @media (min-width: 600px) {
        .wrapper {
          padding: 72px 32px 80px;
        }
        .avatar-ring {
          width: 144px;
          height: 144px;
        }
        .logo-wrap {
          width: 100px;
          height: 100px;
        }
        .logo-wrap img {
          width: 84px;
          height: 84px;
        }
      }
    </style>
  </head>
